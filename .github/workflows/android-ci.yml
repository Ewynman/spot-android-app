name: Android CI

on:
  push:
    branches: [ main, develop, cursor/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "supabase.url=https://aeurigbbohyxvtsfiyul.supabase.co" >> local.properties
        echo "supabase.anonKey=placeholder_for_ci" >> local.properties
        echo "share.baseUrl=https://spotapp.online" >> local.properties
        echo "google.maps.apiKey=placeholder_for_ci" >> local.properties
        echo "billing.productId.proYearly=spot_pro_yearly" >> local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Run Lint
      run: ./gradlew lintDebug --stacktrace
      
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --stacktrace
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/
